<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DR Demo — blog-castilho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0078d4;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 48px 64px;
      text-align: center;
      max-width: 480px;
    }
    .label { font-size: 14px; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }
    .region { font-size: 36px; font-weight: 700; margin: 12px 0 8px; }
    .sub { font-size: 16px; opacity: 0.9; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 13px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Região Ativa</p>
    <p class="region">__REGION__</p>
    <p class="sub">blog-castilho · DR Demo App</p>
    <span class="badge">Azure Kubernetes Service</span>
  </div>
</body>
</html>
